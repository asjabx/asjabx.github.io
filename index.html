<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享相册</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <div id="login-screen" class="screen">
            <div class="login-container">
                <h1>共享相册</h1>
                <div id="login-form">
                    <input type="text" id="username" placeholder="用户名" autocomplete="username">
                    <input type="password" id="password" placeholder="密码" autocomplete="current-password">
                    <input type="text" id="nickname" placeholder="昵称（注册时填写）" style="display:none;">
                    <div class="button-group">
                        <button onclick="login()">登录</button>
                        <button onclick="showRegister()" class="secondary">注册</button>
                    </div>
                    <p id="login-message" class="message"></p>
                </div>
                <div id="register-form" style="display:none;">
                    <input type="text" id="reg-username" placeholder="用户名">
                    <input type="password" id="reg-password" placeholder="密码">
                    <input type="text" id="reg-nickname" placeholder="昵称">
                    <div class="button-group">
                        <button onclick="register()">注册</button>
                        <button onclick="showLogin()" class="secondary">返回登录</button>
                    </div>
                    <p id="register-message" class="message"></p>
                </div>
            </div>
        </div>

        <div id="main-screen" class="screen" style="display:none;">
            <header>
                <h2>共享相册</h2>
                <div class="user-info">
                    <span id="user-display"></span>
                    <button onclick="logout()" class="logout-btn">退出</button>
                </div>
            </header>

            <nav id="main-nav">
                <button class="nav-btn active" onclick="showTab('photos')">相册</button>
                <button class="nav-btn" onclick="showTab('albums')">相册分类</button>
                <button class="nav-btn" onclick="showTab('upload')">上传</button>
                <button class="nav-btn admin-only" onclick="showTab('admin')" style="display:none;">管理</button>
            </nav>

            <main>
                <div id="photos-tab" class="tab-content">
                    <div class="toolbar">
                        <div class="filter-group">
                            <select id="album-filter" onchange="loadPhotos()">
                                <option value="">所有相册</option>
                            </select>
                            <select id="type-filter" onchange="loadPhotos()">
                                <option value="">全部类型</option>
                                <option value="photo">照片</option>
                                <option value="video">视频</option>
                                <option value="live">实况</option>
                            </select>
                        </div>
                        <div class="selection-tools" style="display:none;">
                            <span id="selection-count">已选择 0 项</span>
                            <button onclick="downloadSelected()">下载选中</button>
                            <button onclick="deleteSelected()" class="danger">删除选中</button>
                            <button onclick="clearSelection()" class="secondary">取消选择</button>
                        </div>
                    </div>
                    <div id="photo-grid" class="photo-grid"></div>
                    <div id="photo-pagination" class="pagination"></div>
                </div>

                <div id="albums-tab" class="tab-content" style="display:none;">
                    <div class="toolbar">
                        <button onclick="showCreateAlbumModal()">创建相册</button>
                    </div>
                    <div id="album-list" class="album-list"></div>
                </div>

                <div id="upload-tab" class="tab-content" style="display:none;">
                    <div class="upload-container">
                        <div class="upload-area" id="upload-area">
                            <input type="file" id="file-input" multiple accept="image/*,video/*" onchange="handleFileSelect(event)" style="display:none;">
                            <button onclick="document.getElementById('file-input').click()">选择文件</button>
                            <p>支持批量选择照片、视频</p>
                            <p>支持JPG、PNG、HEIC、MP4、MOV等格式</p>
                        </div>
                        <div id="upload-preview" class="upload-preview"></div>
                        <div class="upload-options">
                            <select id="upload-album">
                                <option value="">选择相册（可选）</option>
                            </select>
                            <input type="text" id="upload-tags" placeholder="标签（用逗号分隔）">
                            <input type="text" id="upload-description" placeholder="描述（可选）">
                        </div>
                        <button id="upload-btn" onclick="uploadFiles()" disabled>开始上传</button>
                        <div id="upload-progress" class="upload-progress"></div>
                    </div>
                </div>

                <div id="admin-tab" class="tab-content" style="display:none;">
                    <div class="admin-section">
                        <h3>用户管理</h3>
                        <div id="user-list" class="user-list"></div>
                    </div>
                    <div class="admin-section">
                        <h3>活动记录</h3>
                        <div class="filter-group">
                            <select id="activity-user-filter" onchange="loadActivities()">
                                <option value="">所有用户</option>
                            </select>
                            <select id="activity-type-filter" onchange="loadActivities()">
                                <option value="">所有操作</option>
                                <option value="login">登录</option>
                                <option value="logout">登出</option>
                                <option value="upload">上传</option>
                                <option value="delete">删除</option>
                                <option value="download">下载</option>
                            </select>
                        </div>
                        <div id="activity-list" class="activity-list"></div>
                        <div id="activity-pagination" class="pagination"></div>
                    </div>
                    <div class="admin-section">
                        <h3>统计信息</h3>
                        <div id="stats-grid" class="stats-grid"></div>
                    </div>
                </div>
            </main>
        </div>

        <div id="viewer-modal" class="viewer-modal" style="display:none;">
            <button class="viewer-close" onclick="closeViewer()">×</button>
            <div class="viewer-content">
                <img id="viewer-image" class="viewer-image" style="display:none;">
                <video id="viewer-video" class="viewer-video" controls></video>
            </div>
            <div class="viewer-toolbar">
                <button onclick="zoomIn()">放大</button>
                <button onclick="zoomOut()">缩小</button>
                <button onclick="resetZoom()">重置</button>
                <button onclick="downloadCurrent()">下载</button>
                <button onclick="deleteCurrent()" class="danger">删除</button>
            </div>
            <div class="viewer-info">
                <span id="viewer-filename"></span>
                <span id="viewer-uploader"></span>
                <span id="viewer-date"></span>
            </div>
            <div class="viewer-nav">
                <button onclick="prevPhoto()">上一张</button>
                <button onclick="nextPhoto()">下一张</button>
            </div>
        </div>

        <div id="album-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3 id="album-modal-title">创建相册</h3>
                <input type="hidden" id="edit-album-id">
                <input type="text" id="album-name" placeholder="相册名称">
                <textarea id="album-description" placeholder="相册描述（可选）"></textarea>
                <div class="button-group">
                    <button onclick="saveAlbum()">保存</button>
                    <button onclick="closeAlbumModal()" class="secondary">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
